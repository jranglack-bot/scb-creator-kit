<!DOCTYPE html><html><head><meta charset="utf-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; font-family:'{{FONT}}',sans-serif;
  background:linear-gradient(135deg,{{BG1}} 0%,{{BG2}} 100%);
  display:flex; flex-direction:column; padding:90px;
  color:{{TEXT}}; position:relative; overflow:hidden; }
.imgcard { width:100%; height:560px; border-radius:28px; overflow:hidden;
  margin-bottom:52px; box-shadow:0 24px 60px rgba(0,0,0,.45); }
.imgcard img { width:100%; height:100%; object-fit:cover; }
h2 { font-size:60px; font-weight:800; line-height:1.18; margin-bottom:30px; }
h2 em { font-style:normal; color:{{ACCENT}}; }
.body { font-size:38px; line-height:1.5; opacity:.92; }
.body b { color:{{ACCENT}}; }
.footer { position:absolute; bottom:70px; left:90px; right:90px;
  display:flex; justify-content:space-between; font-size:30px; opacity:.75; }
</style></head><body>
<div class="imgcard"><img src="{{IMAGE}}"></div>
<h2>{{TITLE}}</h2>
<div class="body">{{BODY}}</div>
<div class="footer"><span>{{ACCOUNT}}</span><span>{{PAGE}}</span></div>
</body></html>
