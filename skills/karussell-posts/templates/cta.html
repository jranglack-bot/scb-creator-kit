<!DOCTYPE html><html><head><meta charset="utf-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; font-family:'{{FONT}}',sans-serif;
  background:linear-gradient(135deg,{{BG1}} 0%,{{BG2}} 100%);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:90px; color:{{TEXT}}; position:relative; overflow:hidden; text-align:center; }
h2 { font-size:76px; font-weight:800; line-height:1.16; margin-bottom:44px; }
h2 em { font-style:normal; color:{{ACCENT}}; }
.body { font-size:42px; line-height:1.5; opacity:.92; max-width:820px; margin-bottom:60px; }
.pill { background:{{ACCENT}}; color:{{BG1}}; font-size:52px; font-weight:800;
  padding:28px 70px; border-radius:100px; letter-spacing:1px; }
.footer { position:absolute; bottom:70px; left:90px; right:90px;
  font-size:30px; opacity:.75; }
</style></head><body>
<h2>{{TITLE}}</h2>
<div class="body">{{BODY}}</div>
<div class="pill">{{PILL}}</div>
<div class="footer">{{ACCOUNT}}</div>
</body></html>
